name: Initialize Wiki

on:
  workflow_dispatch:

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create wiki pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir wiki-repo && cd wiki-repo
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "# Welcome to NEXUS HRMS Wiki" > Home.md
          git add Home.md
          git commit -m "Initialize wiki"
          git remote add origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.wiki.git
          git branch -M master
          git push -u origin master
